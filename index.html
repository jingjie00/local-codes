<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Codes</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand-lockup">
          <img class="brand-mark" src="/favicon.svg" alt="" aria-hidden="true" />
          <div>
            <p class="eyebrow">Local Codes</p>
            <h1>Local Codes</h1>
          </div>
        </div>
        <div id="mode-section" class="header-mode">
          <span class="label-text">Mode</span>
          <div class="mode-grid" role="group" aria-label="Generator mode">
            <button type="button" class="mode-button icon-button is-active" data-mode="qr">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4h6v6H4z" />
                <path d="M14 4h6v6h-6z" />
                <path d="M4 14h6v6H4z" />
                <path d="M15 15h2v2h-2z" />
                <path d="M19 15h1v5h-5v-1" />
              </svg>
              <span>QR Code</span>
            </button>
            <button type="button" class="mode-button icon-button" data-mode="barcode">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6v12" />
                <path d="M7 6v12" />
                <path d="M11 6v12" />
                <path d="M15 6v12" />
                <path d="M20 6v12" />
              </svg>
              <span>Barcode</span>
            </button>
          </div>
        </div>
      </header>

      <section class="workspace" aria-label="Code generator">
        <aside class="controls" aria-label="Code options">
          <div class="panel-title">
            <h2>Content</h2>
          </div>

          <div id="qr-type-section" class="field-group">
            <span class="label-text">QR type</span>
            <div id="content-type" class="type-grid" role="group" aria-label="QR type">
              <button type="button" class="type-button icon-button is-active" data-type="url">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1" />
                  <path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1" />
                </svg>
                <span>Link</span>
              </button>
              <button type="button" class="type-button icon-button" data-type="text">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 6h14" />
                  <path d="M8 12h8" />
                  <path d="M10 18h4" />
                </svg>
                <span>Text</span>
              </button>
              <button type="button" class="type-button icon-button" data-type="email">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 6h16v12H4z" />
                  <path d="m4 7 8 6 8-6" />
                </svg>
                <span>Email</span>
              </button>
              <button type="button" class="type-button icon-button" data-type="phone">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 4h4l2 5-3 2a10 10 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A17 17 0 0 1 3 6a2 2 0 0 1 2-2h2z" />
                </svg>
                <span>Phone</span>
              </button>
              <button type="button" class="type-button icon-button" data-type="sms">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 5h14v10H8l-4 4V6a1 1 0 0 1 1-1z" />
                  <path d="M8 9h8" />
                  <path d="M8 12h5" />
                </svg>
                <span>SMS</span>
              </button>
              <button type="button" class="type-button icon-button" data-type="wifi">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 9a11 11 0 0 1 14 0" />
                  <path d="M8 13a6 6 0 0 1 8 0" />
                  <path d="M12 18h.01" />
                </svg>
                <span>Wi-Fi</span>
              </button>
            </div>
          </div>

          <div id="dynamic-fields" class="dynamic-fields"></div>

          <div id="barcode-fields" class="dynamic-fields is-hidden">
            <div class="field-group">
              <label for="barcode-value">Barcode text</label>
              <input id="barcode-value" type="text" value="123456789012" />
            </div>
            <div class="grid-2">
              <div class="field-group">
                <label for="barcode-format">Format</label>
                <select id="barcode-format">
                  <option value="CODE128">CODE128</option>
                  <option value="EAN13">EAN-13</option>
                  <option value="UPC">UPC</option>
                  <option value="ITF14">ITF-14</option>
                </select>
              </div>
              <label class="checkbox-control compact-check">
                <input id="barcode-text" type="checkbox" checked />
                Show text
              </label>
            </div>
          </div>

          <div id="qr-logo-section" class="grid-2">
            <div class="field-group">
              <span class="label-text">Center logo</span>
              <div class="logo-picker">
                <input id="logo-file" class="visually-hidden" type="file" accept="image/*" />
                <label class="logo-choose icon-button" for="logo-file">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14" />
                    <path d="M5 12h14" />
                  </svg>
                  <span>Choose image</span>
                </label>
                <div class="logo-meta">
                  <span id="logo-name">No logo selected</span>
                  <button id="logo-remove" class="logo-remove icon-only" type="button" disabled aria-label="Remove logo" title="Remove logo">
                    <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M18 6 6 18" />
                      <path d="m6 6 12 12" />
                    </svg>
                  </button>
                </div>
                <img id="logo-preview" class="logo-preview is-hidden" alt="Selected logo preview" />
              </div>
            </div>
            <div class="field-group">
              <label for="logo-size">Logo size</label>
              <input id="logo-size" type="range" min="10" max="30" value="18" />
            </div>
          </div>

          <div id="qr-settings-section" class="settings-grid">
            <div class="field-group correction-field">
              <div class="range-label">
                <label for="error-level">Error correction</label>
                <span id="error-level-value">High</span>
              </div>
              <input id="error-level" type="range" min="0" max="3" step="1" value="3" />
            </div>
            <div class="field-group">
              <div class="range-label">
                <label for="margin">Quiet zone</label>
                <span id="margin-value">4</span>
              </div>
              <input id="margin" type="range" min="0" max="10" value="4" />
            </div>
          </div>
        </aside>

        <section class="preview-pane" aria-label="Generated code preview">
          <div class="preview-controls" aria-label="Visual style options">
            <div id="color-section" class="grid-2">
              <div class="field-group">
                <label for="dot-color">Code color</label>
                <div class="color-control">
                  <input id="dot-color" type="color" value="#111827" />
                  <input id="dot-color-text" type="text" value="#111827" maxlength="7" />
                </div>
                <label class="transparent-toggle">
                  <input id="transparent-code" type="checkbox" />
                  Transparent
                </label>
              </div>
              <div class="field-group">
                <label for="background-color">Background</label>
                <div class="color-control">
                  <input id="background-color" type="color" value="#ffffff" />
                  <input id="background-color-text" type="text" value="#ffffff" maxlength="7" />
                </div>
                <label class="transparent-toggle">
                  <input id="transparent-background" type="checkbox" checked />
                  Transparent
                </label>
              </div>
            </div>

            <div id="qr-style-section" class="grid-2">
              <div class="field-group">
                <span class="label-text">QR pixels</span>
                <div class="option-grid two-options" role="group" aria-label="QR pixels">
                  <button type="button" class="option-button icon-button is-active" data-dot-style="square">
                    <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M7 7h10v10H7z" />
                    </svg>
                    <span>Square</span>
                  </button>
                  <button type="button" class="option-button icon-button" data-dot-style="rounded">
                    <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M8 5h8a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3z" />
                    </svg>
                    <span>Round</span>
                  </button>
                </div>
              </div>
              <div class="field-group">
                <label for="roundness">Roundness</label>
                <input id="roundness" type="range" min="0" max="100" value="80" />
              </div>
            </div>
          </div>
          <div class="preview-toolbar">
            <span id="payload-summary">Link QR</span>
            <span id="size-summary">1024 px JPG</span>
          </div>
          <div class="qr-stage">
            <canvas id="qr-canvas" width="512" height="512" aria-label="QR code preview"></canvas>
          </div>
          <div class="export-panel" aria-label="Export options">
            <div class="field-group">
              <label for="jpg-size">JPG size</label>
              <div class="range-row">
                <input id="jpg-size" type="range" min="256" max="4096" step="128" value="1024" />
                <input id="jpg-size-number" type="number" min="256" max="4096" step="128" value="1024" />
              </div>
            </div>
            <div class="actions">
              <button id="download-jpg" class="icon-button secondary-action" type="button">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3v12" />
                  <path d="m7 10 5 5 5-5" />
                  <path d="M5 20h14" />
                </svg>
                <span>JPG</span>
              </button>
              <button id="download-svg" class="icon-button primary-action" type="button">
                <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3v12" />
                  <path d="m7 10 5 5 5-5" />
                  <path d="M5 20h14" />
                </svg>
                <span>SVG</span>
              </button>
            </div>
            <p id="message" class="message" role="status"></p>
          </div>
        </section>
      </section>
      <footer class="app-footer">
        <a href="https://github.com/jingjie00/local-codes" target="_blank" rel="noreferrer">
          https://github.com/jingjie00/local-codes
        </a>
        <span>Built by Tan Jing Jie (Jay)</span>
      </footer>
    </main>
  </body>
</html>
